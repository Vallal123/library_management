services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:15-alpine
    container_name: library_postgres
    environment:
      POSTGRES_DB: ${NAME}
      POSTGRES_USER: ${USER}
      POSTGRES_PASSWORD: ${PASS}
      POSTGRES_HOST_AUTHENTICATION_METHOD: md5
    ports:
      - "5432:5432"
    volumes:
      # Named volume: persists data even if container stops
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Checks if PostgreSQL is ready to accept connections
      test: [ "CMD-SHELL", "pg_isready -U ${USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - library_network

  # Redis Service (Celery Broker + Cache)
  redis:
    image: redis:7-alpine
    container_name: library_redis
    ports:
      - "6379:6379"
    volumes:
      # Named volume: persists Redis data
      - redis_data:/data
    healthcheck:
      # Checks if Redis is responding to PING
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - library_network
    command: redis-server --appendonly yes

  # Django Application Service
  web:
    build: .
    container_name: library_web
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      # Bind mount: changes in code reflect instantly (hot reload)
      - .:/app
    ports:
      - "8000:8000"
    environment:
      # Load all variables from .env file
      - DEBUG=True
      - SECRET_KEY=${SECRET_KEY}
      - ENGINE=${ENGINE}
      - NAME=${NAME}
      - USER=${USER}
      - PASS=${PASS}
      # Database host is the service name 'postgres' (Docker DNS)
      - HOST=postgres
      - PORT=${PORT}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8000
      # Redis URL: service name 'redis' instead of 'localhost'
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - library_network

  # Celery Worker Service (runs background tasks)
  celery_worker:
    build: .
    container_name: library_celery_worker
    command: celery -A config worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - SECRET_KEY=${SECRET_KEY}
      - ENGINE=${ENGINE}
      - NAME=${NAME}
      - USER=${USER}
      - PASS=${PASS}
      - HOST=postgres
      - PORT=${PORT}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
      - web
    networks:
      - library_network

  # Celery Beat Service (runs scheduled tasks)
  celery_beat:
    build: .
    container_name: library_celery_beat
    command: celery -A config beat --loglevel=info
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - SECRET_KEY=${SECRET_KEY}
      - ENGINE=${ENGINE}
      - NAME=${NAME}
      - USER=${USER}
      - PASS=${PASS}
      - HOST=postgres
      - PORT=${PORT}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
      - web
    networks:
      - library_network

# Named volumes: persist data across container restarts
volumes:
  postgres_data:
  redis_data:

    # Custom network: allows services to communicate by service name
networks:
  library_network:
    driver: bridge
